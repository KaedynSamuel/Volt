appId: com.volt.desktop
productName: Volt
copyright: Copyright © 2025 Volt

# Build output directory
directories:
  output: dist
  buildResources: electron/assets

# Files to include in the build
files:
  - .next/**/*
  - public/**/*
  - node_modules/**/*
  - package.json
  - next.config.mjs
  - electron/main.js
  - electron/preload.js
  - electron/splash.html
  - "!node_modules/.cache/**/*"
  - "!**/.git/**/*"
  - "!**/test/**/*"
  - "!**/*.test.*"
  - "!**/*.spec.*"

# Entry point
extends: null

# ── Windows (.exe installer) ─────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: electron/assets/icon.ico
  publisherName: Volt
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  installerIcon: electron/assets/icon.ico
  uninstallerIcon: electron/assets/icon.ico
  installerHeaderIcon: electron/assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Volt
  menuCategory: Volt
  runAfterFinish: true
  include: electron/assets/installer.nsh

# ── macOS (.dmg) ─────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: electron/assets/icon.icns
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/assets/entitlements.mac.plist
  entitlementsInherit: electron/assets/entitlements.mac.plist
  darkModeSupport: true

dmg:
  title: Volt ${version}
  background: electron/assets/dmg-background.png
  icon: electron/assets/icon.icns
  iconSize: 80
  contents:
    - x: 180
      y: 170
    - x: 480
      y: 170
      type: link
      path: /Applications

# ── Linux (.AppImage) ────────────────────────────────────────────────────────
linux:
  target:
    - AppImage
    - deb
  icon: electron/assets/icon.png
  category: Office
  maintainer: Volt

