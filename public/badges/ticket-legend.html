<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:260px;height:260px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.b{width:240px;height:240px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:46px;background:radial-gradient(ellipse at 40% 25%,#1a1000 0%,#0d0800 60%,#020202 100%);border:1.5px solid #ef444466;box-shadow:0 0 0 1px #000,0 0 40px rgba(239,68,68,0.2),0 0 80px rgba(239,68,68,0.08),inset 0 1px 0 rgba(239,68,68,0.18),inset 0 0 80px rgba(239,68,68,0.04);overflow:hidden;}
.hx{position:absolute;inset:0;opacity:0.035;background-image:repeating-linear-gradient(0deg,#ef4444 0,transparent 1px,transparent 18px),repeating-linear-gradient(60deg,#ef4444 0,transparent 1px,transparent 18px),repeating-linear-gradient(120deg,#ef4444 0,transparent 1px,transparent 18px);}
.cone{position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:48px solid transparent;border-right:48px solid transparent;border-top:130px solid rgba(239,68,68,0.06);filter:blur(6px);}
.cg{position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(239,68,68,0.09) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-58%);}
.orb{position:absolute;width:158px;height:158px;border-radius:50%;border:1px solid rgba(239,68,68,0.12);top:50%;left:50%;transform:translate(-50%,-55%);}
.orb::before{content:'';position:absolute;width:7px;height:7px;border-radius:50%;background:#ef4444;top:-3.5px;left:50%;transform:translateX(-50%);box-shadow:0 0 10px #ef4444,0 0 20px #ef444488;animation:orb 4s linear infinite;}
@keyframes orb{from{transform:translateX(-50%) rotate(0deg) translateX(79px) rotate(0deg);}to{transform:translateX(-50%) rotate(360deg) translateX(79px) rotate(-360deg);}}
.r1{position:absolute;border-radius:50%;border:1.5px solid rgba(239,68,68,0.35);width:68px;height:15px;bottom:24px;left:50%;transform:translateX(-50%);}
.r2{position:absolute;border-radius:50%;border:1px solid rgba(239,68,68,0.18);width:108px;height:25px;bottom:18px;left:50%;transform:translateX(-50%);}
.r3{position:absolute;border-radius:50%;border:1px solid rgba(239,68,68,0.07);width:152px;height:35px;bottom:12px;left:50%;transform:translateX(-50%);}
.pf{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:62px;height:7px;border-radius:50%;background:rgba(239,68,68,0.18);filter:blur(5px);}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:0;}15%{opacity:1;}85%{opacity:0.7;}100%{transform:translateY(16px) rotate(270deg);opacity:0;}}
@keyframes spk{0%,100%{opacity:0;transform:scale(0.5) rotate(0deg);}50%{opacity:1;transform:scale(1.1) rotate(45deg);}}
.pill{position:absolute;top:13px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);border-radius:20px;padding:2px 9px;font-family:"Courier New",monospace;font-size:7px;font-weight:700;color:#ef4444;letter-spacing:0.22em;text-transform:uppercase;z-index:3;white-space:nowrap;}
.icon{position:relative;z-index:2;width:108px;height:108px;margin-bottom:2px;filter:drop-shadow(0 0 8px #ef4444) drop-shadow(0 0 18px #ef4444cc) drop-shadow(0 0 40px #ef444480) drop-shadow(0 0 70px #ef444444);}
.icon svg{width:100%;height:100%;}
.tb{position:relative;z-index:2;text-align:center;}
.bn{font-family:"Courier New",monospace;font-size:9px;font-weight:700;color:rgba(239,68,68,0.4);letter-spacing:0.28em;text-transform:uppercase;margin-bottom:1px;}
.bname{font-family:"Courier New",monospace;font-size:12.5px;font-weight:700;color:#ef4444;letter-spacing:0.14em;text-transform:uppercase;text-shadow:0 0 10px #ef4444,0 0 22px #ef4444cc,0 0 44px #ef444480;}
.bdesc{font-family:"Courier New",monospace;font-size:7px;color:rgba(239,68,68,0.38);letter-spacing:0.1em;margin-top:2px;text-transform:uppercase;}
.div{width:46px;height:1px;background:linear-gradient(90deg,transparent,rgba(239,68,68,0.45),transparent);margin:3px auto;}
.c{position:absolute;width:17px;height:17px;}
.ctl{top:10px;left:10px;border-top:1.5px solid #ef444499;border-left:1.5px solid #ef444499;}
.ctr{top:10px;right:10px;border-top:1.5px solid #ef444499;border-right:1.5px solid #ef444499;}
.cbl{bottom:10px;left:10px;border-bottom:1.5px solid #ef444499;border-left:1.5px solid #ef444499;}
.cbr{bottom:10px;right:10px;border-bottom:1.5px solid #ef444499;border-right:1.5px solid #ef444499;}
.cd{position:absolute;width:4px;height:4px;border-radius:50%;background:#ef4444bb;box-shadow:0 0 8px #ef4444;}
.cdtl{top:8px;left:8px;}.cdtr{top:8px;right:8px;}.cdbl{bottom:8px;left:8px;}.cdbr{bottom:8px;right:8px;}
.sd{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(239,68,68,0.4);box-shadow:0 0 5px #ef4444;}
.sdl{top:50%;left:8px;transform:translateY(-50%);}.sdr{top:50%;right:8px;transform:translateY(-50%);}
.tl{position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(239,68,68,0.5),transparent);}
.bl{position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(239,68,68,0.35),transparent);}
</style></head><body>
