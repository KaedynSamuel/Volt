<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .glow-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .logo-ring {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 22px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(139,92,246,0.4), 0 0 80px rgba(139,92,246,0.15);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-letter {
      font-size: 36px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
    }

    .app-name {
      margin-top: 20px;
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .tagline {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .loader-bar {
      position: absolute;
      bottom: 32px;
      width: 160px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      border-radius: 999px;
      animation: loading 1.4s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(139,92,246,0.4), 0 0 80px rgba(139,92,246,0.15); }
      50% { box-shadow: 0 0 60px rgba(139,92,246,0.6), 0 0 100px rgba(139,92,246,0.25); }
    }

    .version {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="logo-ring">
    <span class="logo-letter">V</span>
  </div>
  <div class="app-name">Volt</div>
  <div class="tagline">Starting your workspace…</div>
  <div class="loader-bar">
    <div class="loader-fill"></div>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
