name: Build Volt

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  deploy-azure:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B63D3F2DFF4E4F90A99EE87510B79AA9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D1820D58A337472AB3FCFE780D971A7E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_46993A5335644A32A2F26A674A03CBE4 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'VoltDox'
          slot-name: 'Production'
          package: .

  build-electron:
    name: Build Windows Desktop App
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          ELECTRON_GET_USE_PROXY: false
          GLOBAL_AGENT_NO_PROXY: "*"

      - name: Build Electron app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Volt-Windows
          path: dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Volt v${{ github.run_number }}
          body: |
            ## Volt Desktop App — Windows

            **Download the installer below** (`Volt-Setup-*.exe`)

            Built from commit ${{ github.sha }}
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}